name: Bug Report
description: Report a bug in claude-swarm
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What you expected and what happened instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `cat VERSION` or git tag.
      placeholder: "0.18.1"
    validations:
      required: true
